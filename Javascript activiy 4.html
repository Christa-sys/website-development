<!DOCTYPE html>

<title>Javascript text maths methods</title>

</head>
<body>

<script type="text/javascript">

 var value = maths.abs(20)
document.write{"Demo Test Value:" + value  + "<br>"};

 var value = maths.acos(-1)
document.write{"Demo1 Test Value:" + value  + "<br>"};

 var value = maths.asin(1)

 var value = maths.atan(.5)
document.write{"Demo3 Test Value:" + value  + "<br>"};
</script>





</body>
