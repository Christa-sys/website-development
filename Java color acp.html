<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Colour Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:background-color 0.5s ease;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
    font-size:18px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#colorCode{
    font-weight:bold;
    color:#333;
}
</style>

</head>
<body>

<div class="container">
    <h1>🎨 Random Colour Generator</h1>

    <p>Current Colour:</p>
    <h2 id="colorCode">#FFFFFF</h2>

    <br>

    <button onclick="changeColour()">
        Change Colour
    </button>
</div>

<script>

function randomNumber(){
    return Math.floor(Math.random()*256);
}

function changeColour(){

    let red = randomNumber();
    let green = randomNumber();
    let blue = randomNumber();

    let colour = "rgb(" + red + "," + green + "," + blue + ")";

    document.body.style.backgroundColor = colour;

    document.getElementById("colorCode").innerHTML = colour;
}

</script>

</body>
</html>
