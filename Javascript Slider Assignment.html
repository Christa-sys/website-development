<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bootstrap Image Slider</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body{
      background:#111;
      font-family:Arial, sans-serif;
    }

    .slider-container{
      max-width:900px;
      margin:50px auto;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .carousel-item img{
      height:500px;
      object-fit:cover;
    }

    .carousel-caption{
      background:rgba(0,0,0,0.5);
      padding:15px;
      border-radius:10px;
    }

    .carousel-caption h5{
      font-size:2rem;
      font-weight:bold;
    }

    .carousel-caption p{
      font-size:1rem;
    }

    .contact-section{
      background:#fff;
      padding:40px;
      text-align:center;
    }

    .contact-section h2{
      margin-bottom:20px;
      font-weight:bold;
    }

    .contact-btn{
      padding:12px 30px;
      border:none;
      background:#0d6efd;
      color:white;
      border-radius:30px;
      font-size:18px;
      transition:0.3s;
    }

    .contact-btn:hover{
      background:#084298;
      transform:scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Slider -->
  <div class="slider-container">
    <div id="heroSlider" class="carousel slide" data-bs-ride="carousel">

      <!-- Indicators -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="2"></button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner">

        <div class="carousel-item active">
          <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
               class="d-block w-100"
               alt="Nature">
          <div class="carousel-caption">
            <h5>Beautiful Nature</h5>
            <p>Enjoy amazing landscapes and views.</p>
          </div>
        </div>

        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e"
               class="d-block w-100"
               alt="City">
          <div class="carousel-caption">
            <h5>Modern City</h5>
            <p>Experience futuristic urban life.</p>
          </div>
        </div>

        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1519608487953-e999c86e7455"
               class="d-block w-100"
               alt="Mountains">
          <div class="carousel-caption">
            <h5>Adventure Mountains</h5>
            <p>Explore the world with excitement.</p>
          </div>
        </div>

      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#heroSlider" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#heroSlider" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>

    <!-- Contact Section -->
    <div class="contact-section">
      <h2>Contact Us</h2>
      <p>Email: contact@example.com</p>
      <p>Phone: +234 800 000 0000</p>

      <button class="contact-btn">Get In Touch</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
