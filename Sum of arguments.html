<!DOCTYPE html>
<html>
<head>
  <title>Sum of Arguments</title>
</head>
<body>

  <h2>Sum Calculator</h2>

  <button onclick="showSum()">Calculate Sum</button>

  <p id="result"></p>

  <script>
    // Function using arguments object
    function sumAll() {
      let total = 0;

      for (let i = 0; i < arguments.length; i++) {
        total += arguments[i];
      }

      return total;
    }

    function showSum() {
      let result = sumAll(10, 20, 30, 40, 50);
      document.getElementById("result").innerText =
        "Sum is: " + result;
    }
  </script>

</body>
</html>
