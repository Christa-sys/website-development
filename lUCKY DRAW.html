<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>  <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
background-color: aliceblue;
text-align: center;
padding: 30px;
        }
h1{color: navy;}
input{
    padding: 8px;
    margin: 5px;
    border: 2px solid navy;
    border-radius: 6px;
    width: 220px;
}
 button{
    color: navy;
    background-color: white;
    padding: 10px 25px;
    border: none ;
    border-radius: 20px;
    cursor:pointer;
 }

 #timer{
    color: grey;
 }
    </style>


</head>
<body>
  <h1>lucky draw</h1>
<P>Enter your name and guess a number to win</P>
<input type="text" id="name" placeholder="your name" required><br>
<p id="msg-name"></p>
<input type="number" id="guess" placeholder="guess a number (1 to 5)" min="1" max="5" required ><br>
<p id="msg-guess"></p>

<button onclick="checkform()">Try Your luck</button>

<p id="result"></p>
<p id="timer"></p>

<script>
var seconds = 0;
setInterval( function() {
    seconds = seconds + 1;
    document.getElementById("timer").textContent="You have been here for "+ seconds +" seconds!"

},1000)

function checkform(){
    var name = document.getElementById("name").value;
    var guess = document.getElementById("guess").value;
    var ok = true;

if (name==""){
document.getElementById("msg-name").textContent = "Please enter your name!";
document.getElementById("msg-name").style.color = "red";
ok = false;
}
else{
    document.getElementById("msg-name").textContent = "Great name";
    document.getElementById("msg-name").style.color = "green";
}

if (guess ==""){
    document.getElementById("msg-name").textContent = "Please enter a guess";
    document.getElementById("msg-name").style.color = "red";
}
else{
    document.getElementById("msg-name").textContent = "Guess saved";
    document.getElementById("msg-name").style.color = "green";
}

if(ok == true){
    var lucky = Math.floor(Math.random()*5)+1
    if(guess == lucky) {
        document.getElementById("result").textContent = "You win!," + name + "! The lucky Number is " + lucky +" " ;
        document.getElementById("result").style.color = "green"; 
    }
    else{
         document.getElementById("result").textContent = "So close," + name + "! The lucky Number is " + lucky +" .Try again" ;
        document.getElementById("result").style.color = "red"; 
    }
}
}





</script>


</body>
</html>
