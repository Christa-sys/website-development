<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagination Styles</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      background: #f4f4f4;
      padding: 40px;
      font-family: Arial, sans-serif;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 40px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* Rounded Pagination */
    .rounded-pagination .page-link {
      border-radius: 50%;
      margin: 0 5px;
      width: 45px;
      height: 45px;
      text-align: center;
      line-height: 30px;
    }

    /* Gradient Pagination */
    .gradient-pagination .page-link {
      background: linear-gradient(45deg, #007bff, #6610f2);
      color: white;
      border: none;
      margin: 0 3px;
    }

    .gradient-pagination .page-link:hover {
      background: linear-gradient(45deg, #6610f2, #007bff);
    }

    /* Dark Pagination */
    .dark-pagination .page-link {
      background: #212529;
      color: white;
      border: 1px solid #444;
      margin: 0 2px;
    }

    .dark-pagination .page-link:hover {
      background: #0d6efd;
    }

    /* Pill Pagination */
    .pill-pagination .page-link {
      border-radius: 30px;
      padding: 10px 20px;
      margin: 0 5px;
      border: none;
      background: #198754;
      color: white;
    }

    .pill-pagination .page-link:hover {
      background: #146c43;
    }

    /* Shadow Pagination */
    .shadow-pagination .page-link {
      margin: 0 5px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      color: #333;
    }

    .shadow-pagination .page-link:hover {
      background: #0d6efd;
      color: white;
    }
  </style>
</head>

<body>

  <!-- Rounded Pagination -->
  <div class="section">
    <h2>1. Rounded Pagination</h2>

    <nav>
      <ul class="pagination rounded-pagination">
        <li class="page-item"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
      </ul>
    </nav>
  </div>

  <!-- Gradient Pagination -->
  <div class="section">
    <h2>2. Gradient Pagination</h2>

    <nav>
      <ul class="pagination gradient-pagination">
        <li class="page-item"><a class="page-link" href="#">Prev</a></li>
        <li class="page-item"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">Next</a></li>
      </ul>
    </nav>
  </div>

  <!-- Dark Pagination -->
  <div class="section">
    <h2>3. Dark Style Pagination</h2>

    <nav>
      <ul class="pagination dark-pagination">
        <li class="page-item"><a class="page-link" href="#">«</a></li>
        <li class="page-item"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
        <li class="page-item"><a class="page-link" href="#">»</a></li>
      </ul>
    </nav>
  </div>

  <!-- Pill Pagination -->
  <div class="section">
    <h2>4. Pill Button Pagination</h2>

    <nav>
      <ul class="pagination pill-pagination">
        <li class="page-item"><a class="page-link" href="#">Home</a></li>
        <li class="page-item"><a class="page-link" href="#">Services</a></li>
        <li class="page-item"><a class="page-link" href="#">Contact</a></li>
      </ul>
    </nav>
  </div>

  <!-- Shadow Pagination -->
  <div class="section">
    <h2>5. Shadow Pagination</h2>

    <nav>
      <ul class="pagination shadow-pagination">
        <li class="page-item"><a class="page-link" href="#">Previous</a></li>
        <li class="page-item"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
        <li class="page-item"><a class="page-link" href="#">Next</a></li>
      </ul>
    </nav>
  </div>

</body>
</html>
