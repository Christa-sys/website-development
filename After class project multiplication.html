<!DOCTYPE html>
<html>
<head>
    <title>Simple Multiplication</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 120px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Multiplication Calculator</h1>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <br><br>

    <button onclick="calculate()">Multiply</button>

    <div id="result"></div>

    <script>
        // Function with parameters
        function multiply(a, b) {
            return a * b;
        }

        function calculate() {
            let number1 = Number(document.getElementById("num1").value);
            let number2 = Number(document.getElementById("num2").value);

            let answer = multiply(number1, number2);

            document.getElementById("result").innerHTML =
                "Result: " + answer;
        }
    </script>

</body>
</html>
