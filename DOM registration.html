<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#fff;
    width:400px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}
</style>

</head>
<body>

<div class="container">

<h2>Event Registration</h2>

<label>Student Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Phone Number</label>
<input type="text" id="phone">

<label>Select Event</label>
<select id="event">
    <option value="">Choose Event</option>
    <option>Hackathon</option>
    <option>Sports Day</option>
    <option>Music Festival</option>
    <option>Science Fair</option>
</select>

<button onclick="register()">Register</button>

<div id="message"></div>

</div>

<script>

function register(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let phone=document.getElementById("phone").value.trim();
let event=document.getElementById("event").value;

let message=document.getElementById("message");

if(name==""){
    message.className="error";
    message.innerHTML="Enter your name.";
    return;
}

if(!email.includes("@") || !email.includes(".")){
    message.className="error";
    message.innerHTML="Enter a valid email.";
    return;
}

if(phone.length<10 || isNaN(phone)){
    message.className="error";
    message.innerHTML="Enter a valid phone number.";
    return;
}

if(event==""){
    message.className="error";
    message.innerHTML="Select an event.";
    return;
}

message.className="success";
message.innerHTML="Registration successful. Generating your event pass...";

setTimeout(function(){

let pass="PASS-"+Math.floor(Math.random()*90000+10000);

message.innerHTML=
"<h3>🎉 Registration Complete!</h3>" +
"<p><b>Name:</b> "+name+"</p>" +
"<p><b>Event:</b> "+event+"</p>" +
"<p><b>Event Pass:</b> "+pass+"</p>";

},2000);

}

</script>

</body>
</html>
