<h2>Javascript Arrays Methods</h2>
<h2>join() and pop()</h2>
<p>The join() method joins array in to a string and the pop() method removes the last 
  element from the array
</p>
<script>
var fruits = ["Banana", "Apple", "Orange", "Mango"]
document.getElementById("myjoin").innerHTML = fruits.join(" * ");
document.getElementById("myfirstpop").innerHTML = fruits; fruits.pop();
document.getElementById("mysecondpop").innerHTML = fruits;




</script>




</body>
