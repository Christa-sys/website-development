<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Text Fixer Tool</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:80%;
    max-width:700px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.3);
    text-align:center;
}

h1{
    color:#1565c0;
}

input{
    width:90%;
    padding:12px;
    font-size:16px;
    margin:15px 0;
    border:2px solid #1565c0;
    border-radius:8px;
}

button{
    padding:12px 25px;
    font-size:17px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.result{
    margin-top:25px;
    text-align:left;
    background:#e3f2fd;
    padding:20px;
    border-left:6px solid #1565c0;
    border-radius:10px;
}

.result p{
    margin:10px 0;
}
</style>

</head>
<body>

<div class="container">

<h1>📝 My Text Fixer Tool</h1>

<input type="text" id="sentence"
placeholder="Example: I love bad weather">

<br>

<button onclick="fixText()">Fix Text</button>

<div class="result" id="output"></div>

</div>

<script>

function fixText(){

    try{

        let text = document.getElementById("sentence").value;

        if(text.trim() === ""){
            throw "Please enter a sentence.";
        }

        // Check data type
        let dataType = typeof text;

        // Replace a word
        let fixedText = text.replace("bad","beautiful");

        // Convert values
        let numberValue = Number("2026");
        let stringValue = String(numberValue);

        document.getElementById("output").innerHTML = `
        <p><strong>Original Text:</strong> ${text}</p>

        <p><strong>Data Type:</strong> ${dataType}</p>

        <p><strong>Fixed Text:</strong> ${fixedText}</p>

        <p><strong>Converted to Number:</strong> ${numberValue}</p>

        <p><strong>Converted Back to String:</strong> ${stringValue}</p>

        <p style="color:green;"><strong>Status:</strong> Text processed successfully!</p>
        `;

    }

    catch(error){

        document.getElementById("output").innerHTML = `
        <p style="color:red;"><strong>Error:</strong> ${error}</p>
        `;

    }

}

</script>

</body>
</html>
