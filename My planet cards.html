<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Planet Cards</title>
<style>

body {
    font-family: arial;
    background-color: #f0f4ff;
    padding: 30px;
    text-align: center;
}

h1{
    color: #ff5a43;
}

p {color: #555;}
.cards{
display: flex;
justify-content: center;
gap: 20px;
margin-top: 25px;
}

.card{
    background-color: white;
    border: 3px solid #ff5a43;
    border-radius: 12px;
padding: 20px;
width: 200px;
}
.planetname{
    font-size: 22px;
    font-weight: bold;
    color: #333;
}
.planetfact{color: #666;margin-top: 10px;font-size: 14px;}
button{
background-color: #ff5a43;
color: white;
border: none;
padding: 12px 20px;
border-radius: 20px;
cursor:pointer;
font-size: 16px;
margin-top: 10px;
}
</style>
</head>
<body>
<h1>My planet Cards</h1>   
    <p>Use a Javascript class to build planet cards</p>
    <button onclick="showplanets11">Show Planets</button>
<div class="cards">
<div id="card1"></div>
<div id="card2"></div>
<div id="card3"></div>
</div>
<script>
class Planet{
    constructor(name,fact){
        this.name=name
        this.fact=fact
    }
    describe(){
        return this.name + ": " + this.fact
}
}
function showPlanets(){
    let p1 = Planet("Earth","The only planet with life")
    let p2 = Planet("Mars","Known as the red planet")
    let p3 = Planet("Saturn","Has rings of ice")
    


document.getElementById("card1").innerHTML=
"<div class='card1'><div class='planet-name'>" + p1.name + "</div>" +
"<div class'planet-fact'>" + p1.describe + "</div></div>";

document.getElementById("card1").innerHTML=
"<div class='card2'><div class='planet-name'>" + p2.name + "</div>" +
"<div class'planet-fact'>" + p2.describe + "</div></div>";

document.getElementById("card3").innerHTML=
"<div class='card3'><div class='planet-name'>" + p3.name + "</div>" +
"<div class'planet-fact'>" + p3.describe + "</div></div>";
}

</script>




</body>
</html>
